<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0e14" />
    <title>XCOM: Enemy Unknown — Browser</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div class="logo">
          <span class="logo-x">X</span>COM
          <span class="logo-sub">ENEMY UNKNOWN</span>
        </div>
        <div id="mission-info" class="mission-info"></div>
        <div class="turn-controls">
          <button id="btn-auto-battle" class="btn btn-auto" title="Автоматические тактические ходы">⚡ Автобой</button>
          <button id="btn-end-turn" class="btn btn-primary" disabled>Конец хода</button>
        </div>
      </header>

      <main class="game-layout">
        <aside id="unit-panel" class="unit-panel">
          <div id="squad-section" class="panel-section"></div>
          <div id="enemy-section" class="panel-section"></div>
        </aside>
        <div class="canvas-wrap">
          <div id="game-container"></div>
          <div id="soldier-strip" class="soldier-strip"></div>
          <div id="action-bar" class="action-bar"></div>
        </div>
        <aside id="log-panel" class="log-panel">
          <h3>Журнал боя</h3>
          <div id="combat-log" class="combat-log"></div>
        </aside>
      </main>

      <nav id="mobile-dock" class="mobile-dock" aria-label="Мобильная навигация">
        <button type="button" class="dock-tab active" data-tab="map" aria-label="Карта">
          <span class="dock-icon">🗺</span>
          <span class="dock-label">Карта</span>
        </button>
        <button type="button" class="dock-tab" data-tab="squad" aria-label="Отряд">
          <span class="dock-icon">🎖</span>
          <span class="dock-label">Отряд</span>
        </button>
        <button type="button" class="dock-tab" data-tab="enemies" aria-label="Враги">
          <span class="dock-icon">👾</span>
          <span class="dock-label">Враги</span>
        </button>
        <button type="button" class="dock-tab" data-tab="log" aria-label="Журнал">
          <span class="dock-icon">📋</span>
          <span class="dock-label">Журнал</span>
        </button>
      </nav>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-content">
          <h2 id="overlay-title"></h2>
          <p id="overlay-text"></p>
          <button id="overlay-btn" class="btn btn-primary">Продолжить</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
